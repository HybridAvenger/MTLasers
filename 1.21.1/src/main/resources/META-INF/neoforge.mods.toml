modLoader="javafml" #mandatory
loaderVersion="${loader_version_range}"
issueTrackerURL=""
license="MIT (https://github.com/Direwolf20-MC/LaserIO/blob/main/LICENSE.txt)"


[[mods]] #mandatory
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
displayURL=""
#logoFile="examplemod.png"
credits=""
authors=""
description='''
    Can't have DireWire without Wire!
'''

# A dependency - use the . to indicate dependency for a specific modid. Dependencies are optional.
[[dependencies.mtlasers]] #optional
    modId="neoforge" #mandatory
    type="required" #mandatory
    versionRange="${neo_version_range}" #mandatory
    ordering="NONE"
    side="BOTH"
# Here's another dependency
[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    # This version range declares a minimum of the current minecraft version up to but not including the next major version
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
[[dependencies.mtlasers]] #optional
    modId="mekanism" #mandatory
    type="optional" #mandatory
versionRange = "[10.7,)"
    ordering="AFTER"
    side="BOTH"

[[dependencies.mtlasers]] #optional
modId="hybridlib" #mandatory
type="required" #mandatory
versionRange = "[0.0.2-1.21.1-Neoforge,)"
ordering="AFTER"
side="BOTH"